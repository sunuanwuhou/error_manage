services:
  db:
    image: pgvector/pgvector:pg15
    container_name: error-manage-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: wrongquestion
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./prisma/init-extensions.sql:/docker-entrypoint-initdb.d/init-extensions.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wrongquestion"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: error-manage-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.docker
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/wrongquestion
      DIRECT_URL: postgresql://postgres:postgres@db:5432/wrongquestion
      NEXTAUTH_URL: http://localhost:3000
    ports:
      - "3000:3000"
    command: >
      sh -c "npm run db:push &&
      npm run build &&
      npm run start"

volumes:
  pgdata:
